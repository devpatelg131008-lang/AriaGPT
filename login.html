<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - AriaGPT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <svg viewBox="0 0 60 60" fill="none" class="logo-icon">
          <g stroke="url(#logoGrad)" stroke-width="3" stroke-linecap="round">
            <path d="M30,8 A22,22 0 0,1 48.5,30"/>
            <path d="M47.5,36 A22,22 0 0,1 14.5,44"/>
            <path d="M12.5,36 A22,22 0 0,1 19.8,10.8"/>
          </g>
          <circle cx="30" cy="30" r="3" fill="url(#logoGrad)"/>
          <defs>
            <linearGradient id="logoGrad" x1="8" y1="8" x2="52" y2="52">
              <stop offset="0%" stop-color="#a78bfa"/>
              <stop offset="100%" stop-color="#6366f1"/>
            </linearGradient>
          </defs>
        </svg>
        <h1 class="login-title">AriaGPT</h1>
        <p class="login-subtitle">Sign in to start chatting</p>
      </div>

      <!-- Google Sign In Button -->
      <button class="google-btn" id="googleSignInBtn">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>

      <!-- Guest Option -->
      <div class="divider">
        <span>or</span>
      </div>
      <button class="guest-btn" id="guestSignInBtn">
        <span>Continue as Guest</span>
      </button>

      <div class="login-footer">
        <p>By signing in, you agree to our Terms of Service and Privacy Policy</p>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    // Your Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyB0Bje9ccGHO5fLIQ30vlC-6XdcnNBPZs0",
      authDomain: "groqsocial.firebaseapp.com",
      projectId: "groqsocial",
      storageBucket: "groqsocial.firebasestorage.app",
      messagingSenderId: "808235322921",
      appId: "1:808235322921:web:1e43bffbe3c5e04c805638",
      measurementId: "G-EY2DH72Q5Y"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Device session helper
    function getDeviceSession() {
      try {
        return JSON.parse(localStorage.getItem('ariagpt_device_session') || '{}');
      } catch { return {}; }
    }

    // Check if user is already signed in (device recognition)
    onAuthStateChanged(auth, (user) => {
      if (user) {
        const session = getDeviceSession();
        // If device session exists and matches current user, skip login UI
        if (session.uid === user.uid && session.verified) {
          // Returning user on recognized device - skip login & onboarding
          localStorage.setItem('ariagpt_user', JSON.stringify({
            uid: user.uid,
            displayName: user.displayName,
            email: user.email,
            photoURL: user.photoURL
          }));
          window.location.href = 'index.html';
        }
        // Otherwise, stay on login page to show UI for new device/user
      }
    });

    // Google Sign In
    document.getElementById('googleSignInBtn').addEventListener('click', async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        console.log('Signed in as:', user.displayName);
        // Store user info in localStorage for the main app
        localStorage.setItem('ariagpt_user', JSON.stringify({
          uid: user.uid,
          displayName: user.displayName,
          email: user.email,
          photoURL: user.photoURL
        }));
        // Mark this device as recognized for this user
        localStorage.setItem('ariagpt_device_session', JSON.stringify({
          uid: user.uid,
          verified: true,
          timestamp: Date.now()
        }));
        // Redirect to main app
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Sign in error:', error);
        alert('Sign in failed: ' + error.message);
      }
    });

    // Guest Sign In
    document.getElementById('guestSignInBtn').addEventListener('click', () => {
      // Generate a unique guest ID
      const guestId = 'guest_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
      // Store guest info
      localStorage.setItem('ariagpt_user', JSON.stringify({
        uid: guestId,
        displayName: 'Guest User',
        email: '',
        photoURL: null,
        isGuest: true
      }));
      // Mark as guest session
      localStorage.setItem('ariagpt_guest_session', JSON.stringify({
        guestId: guestId,
        createdAt: Date.now()
      }));
      // Redirect to main app
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
